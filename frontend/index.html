<!DOCTYPE html>
<html>

<head>
    <title>IMDb Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>IMDb</h1>
        <input id="search" placeholder="Search movies..." />
    </header>

    <section>
        <h2>⭐ Recommended Movies</h2>
        <button onclick="loadRecommended()">Show Recommendations</button>
        <div id="recommended" class="row"></div>
    </section>

    <section>
        <h2>🔥 Vijay Movies</h2>
        <div id="vijay" class="row"></div>
    </section>

    <section>
        <h2>🎬 All Movies</h2>
        <div id="movies" class="grid"></div>
    </section>

    <script src="script.js"></script>
</body>

</html>
